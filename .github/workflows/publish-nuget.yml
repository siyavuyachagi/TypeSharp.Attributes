name: Publish NuGet Package

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' TypeSharp.Attributes/TypeSharp.Attributes.csproj)
            echo "No release tag — using csproj version: $VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION"

      - name: Debug paths
        run: |
          echo "Current directory: $(pwd)"
          find . -name "*.csproj" | head -20
          find . -name "Directory.Build.props" | head -10
          find . -name "global.json" | head -10
          cat TypeSharp.Attributes/TypeSharp.Attributes.csproj

      - name: Update package version
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${{ env.VERSION }}</Version>|" \
            TypeSharp.Attributes/TypeSharp.Attributes.csproj

      - name: Restore dependencies
        run: dotnet restore TypeSharp.Attributes/TypeSharp.Attributes.csproj

      - name: Build
        run: |
          dotnet build TypeSharp.Attributes/TypeSharp.Attributes.csproj \
            --configuration Release \
            --no-restore

      - name: Pack
        run: |
          dotnet pack TypeSharp.Attributes/TypeSharp.Attributes.csproj \
            --configuration Release \
            --no-build \
            --output ./nuget-output

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./nuget-output/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
